<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#6c63ff,#00c9a7);
        }

        .login-box{
            width:320px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#6c63ff;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:none;
            background:#f5f7fa;
            border-radius:10px;
            outline:none;
        }

        .login-box button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:25px;
            background:#6c63ff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .login-box button:hover{
            background:#00c9a7;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>Login</h2>

        <form action="index.html">

            <input 
            type="email" 
            placeholder="Enter Email"
            required>

            <input 
            type="password" 
            placeholder="Enter Password"
            required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
